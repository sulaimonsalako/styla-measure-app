# Automated Fastlane Cloud Build & TestFlight Delivery for STYLA
name: Build and Deploy Safari Extension to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup App Store Connect Auth Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Convert Chrome Extension to Safari Xcode Project
        run: |
          mkdir -p build-safari
          xcrun safari-web-extension-converter ./chrome-extension \
            --no-open \
            --project-location ./build-safari \
            --app-name "STYLA Stylist" \
            --bundle-identifier "com.styla.measure.safari" || true

      - name: Build & Deploy to TestFlight via Fastlane
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          cd build-safari/"STYLA Stylist" || cd build-safari/* || true
          fastlane pilot upload --key_id "$APPSTORE_KEY_ID" --issuer_id "$APPSTORE_ISSUER_ID" --api_key_path ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 --skip_waiting_for_build_processing true || true

      - name: Archive Xcode Project Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: STYLA-Safari-Extension-Xcode-Project
          path: build-safari/
