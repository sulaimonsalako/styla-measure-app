# Automated Production Cloud Build & TestFlight Delivery for STYLA Safari Extension
name: Build and Deploy Safari Extension to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "*"

      - name: Setup App Store Connect Auth Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | openssl base64 -d -A > $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | openssl base64 -d -A > "$PROFILES_DIR/STYLA_Safari_Distribution.mobileprovision"

      - name: Convert Chrome Extension to Safari Xcode Project
        run: |
          mkdir -p build-safari
          xcrun safari-web-extension-converter ./chrome-extension \
            --no-open \
            --project-location ./build-safari \
            --app-name "STYLA Stylist" \
            --bundle-identifier "com.styla.measure.safari" \
            --swift \
            --copy-resources

      - name: Build & Archive iOS App
        run: |
          cd build-safari/"STYLA Stylist"
          xcodebuild -project "STYLA Stylist.xcodeproj" \
                     -scheme "STYLA Stylist (iOS)" \
                     -configuration Release \
                     -archivePath ./STYLA.xcarchive \
                     DEVELOPMENT_TEAM="TLL7636THR" \
                     CODE_SIGN_STYLE="Automatic" archive || \
          xcodebuild -project "STYLA Stylist.xcodeproj" \
                     -configuration Release \
                     -archivePath ./STYLA.xcarchive \
                     DEVELOPMENT_TEAM="TLL7636THR" archive

      - name: Export IPA & Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          cd build-safari/"STYLA Stylist"
          if [ -d "./STYLA.xcarchive" ]; then
            xcodebuild -exportArchive \
                       -archivePath ./STYLA.xcarchive \
                       -exportOptionsPlist ../../exportOptions.plist \
                       -exportPath ./export || true
            
            IPA_PATH=$(find ./export -name "*.ipa" | head -n 1)
            if [ -n "$IPA_PATH" ]; then
              xcrun altool --upload-app -f "$IPA_PATH" -t ios --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID"
            fi
          fi

      - name: Archive Xcode Project Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: STYLA-Safari-Extension-Xcode-Project
          path: build-safari/
