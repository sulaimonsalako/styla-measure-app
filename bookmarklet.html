<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STYLA Mobile Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #07070f;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --accent-pink: #ff2a75;
      --accent-light: #ff75a0;
      --font-main: 'Inter', sans-serif;
      --font-head: 'Outfit', sans-serif;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-main);
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 12px;
    }

    .brand {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.25rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .close-btn {
      color: var(--text-muted);
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .verdict-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .verdict-size {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-pink);
      margin-bottom: 12px;
    }

    /* Score Meter */
    .score-container {
      margin-bottom: 16px;
    }
    .score-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .score-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--accent-pink), var(--accent-light));
      width: 0%;
      transition: width 0.5s ease-out;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .breakdown-item:last-child {
      border-bottom: none;
    }
    .breakdown-label {
      color: var(--text-muted);
    }
    .breakdown-val {
      font-weight: 500;
    }

    .explanation {
      font-size: 0.85rem;
      line-height: 1.4;
      color: var(--text-muted);
      margin-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 12px;
    }

    .error-box {
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
      color: #fca5a5;
      padding: 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      text-align: center;
    }
    .error-box a {
      color: var(--accent-light);
      text-decoration: underline;
    }

    /* Loader */
    .loader-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-pink);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Chat widget */
    .chat-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      border-top: 1px solid var(--card-border);
      padding-top: 16px;
    }
    .chat-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .chat-messages {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      overflow-y: auto;
      height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .chat-bubble {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-pink), #d90040);
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: #f0f0ff;
      border-bottom-left-radius: 2px;
    }

    .chat-input-box {
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }
    .chat-input:focus {
      border-color: var(--accent-pink);
    }
    .chat-send-btn {
      background: var(--accent-pink);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">? STYLA Size Finder</div>
    <button class="close-btn" onclick="closeWidget()">?</button>
  </header>

  <!-- 3D Scan Active Badge -->
  <div id="active-scan-badge" style="display: none; background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.3); color: #a7f3d0; margin: 0 16px 12px 16px; padding: 8px 12px; font-size: 11px; border-radius: 8px; line-height: 1.4;">

  <main id="main-content">

    <div id="result-view" style="display: none;">
      <div class="card">
        <div class="verdict-title">?? Recommended Fit</div>
        <div class="verdict-size" id="size-verdict">M</div>
        
        <div class="score-container">
          <div class="score-header">
            <span>Fit Match Score</span>
            <span id="score-val">98%</span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" id="score-bar"></div>
          </div>
        </div>

        <div id="breakdown-box">
          <!-- Dynamically generated breakdown -->

        <p class="explanation" id="explanation-text"></p>
        
        <!-- Fallback size chart screenshot uploader -->
        <div id="manual-upload-container" style="margin-top: 14px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 14px;">
          <label id="btn-trigger-upload" style="background: transparent; border: 1px dashed rgba(255,255,255,0.2); font-size: 11px; height: 32px; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; cursor: pointer; box-sizing: border-box; border-radius: 8px; color: var(--text-muted);">
            <span>📁</span> Or Upload Size Chart Image

          <input type="file" id="ext-file-upload" accept="image/*" style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; overflow: hidden;" />

      <div class="chat-section">
        <div class="chat-title">?? Ask Follow-up Questions</div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-bubble assistant">Hello! I'm your Tailor AI sizing companion. Ask me anything about how this garment will fit you.</div>
        </div>
        <div class="chat-input-box">
          <input type="text" class="chat-input" id="chat-input" placeholder="Will the chest fit tight?..." autocomplete="off">
          <button class="chat-send-btn" id="chat-send-btn">Ask</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://tneflxtpmzodauygtslk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZWZseHRwbXpvZGF1eWd0c2xrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzA1NTMsImV4cCI6MjA5MzkwNjU1M30.DkzB5-novfMp1IaY4d9710YTv_U7DME3_EC8Jc87MLc";

    // Close bookmarklet widget in parent window
    function closeWidget() {
      window.parent.postMessage({ type: 'STYLA_WIDGET_CLOSE' }, '*');
    }

    // Listens for scraped payload from parent window
    window.addEventListener('message', async (event) => {
      const payload = event.data;
      if (payload && payload.type === 'STYLA_SCRAPE_RESULT') {
        activeScrapedContext = payload;
        await runSizingDecode();
      }
    });

    function compressFileImage(file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxWidth) {
                height = Math.round(height * maxWidth / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round(width * maxHeight / height);
                height = maxHeight;
              }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function runAnalysisWithUploadedImage(base64Image) {
      const loader = document.getElementById('loader');
      const resultView = document.getElementById('result-view');
      const setupView = document.getElementById('setup-view');
      const guestLoginView = document.getElementById('guest-login-view');
      const loaderText = document.getElementById('loader-text');

      loaderText.textContent = "Analyzing uploaded size chart...";
      loader.style.display = 'flex';
      resultView.style.display = 'none';
      setupView.style.display = 'none';
      guestLoginView.style.display = 'none';

      const chest = localStorage.getItem('styla_twin_chest');
      const waist = localStorage.getItem('styla_twin_waist');
      const belly = localStorage.getItem('styla_twin_belly');
      const hips = localStorage.getItem('styla_twin_hips');
      const height = localStorage.getItem('styla_twin_height');
      const inseam = localStorage.getItem('styla_twin_inseam');

      let api_scans = [];
      try {
        const rawScans = localStorage.getItem('styla_twin_api_scans');
        if (rawScans) api_scans = JSON.parse(rawScans);
      } catch (e) {}

      let measurement_overrides = {};
      try {
        const rawOverrides = localStorage.getItem('styla_twin_measurement_overrides');
        if (rawOverrides) measurement_overrides = JSON.parse(rawOverrides);
      } catch (e) {}

      try {
        const res = await fetch('/api/extension-decode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chest, waist, belly, hips, height, inseam,
            api_scans,
            measurement_overrides,
            pageTitle: activeScrapedContext ? activeScrapedContext.pageTitle : "Uploaded Size Chart",
            pageText: activeScrapedContext ? activeScrapedContext.pageText : "",
            tableHtml: "",
            imagesBase64: [base64Image],
            url: activeScrapedContext ? activeScrapedContext.url : window.location.href
          })
        });

        const data = await res.json();
        loader.style.display = 'none';

        if (res.ok) {
          resultView.style.display = 'flex';
          
          if (!data.recommended_size) {
            document.getElementById('size-verdict').textContent = "Unknown";
            document.getElementById('explanation-text').textContent = "No size chart was detected on this uploaded image.";
            return;
          }

          document.getElementById('size-verdict').textContent = data.recommended_size;
          document.getElementById('score-val').textContent = `${data.fit_match_score}%`;
          document.getElementById('score-bar').style.width = `${data.fit_match_score}%`;
          document.getElementById('explanation-text').textContent = data.explanation || '';

          const breakdownBox = document.getElementById('breakdown-box');
          breakdownBox.innerHTML = '';
          if (data.fit_breakdown) {
            for (const [key, desc] of Object.entries(data.fit_breakdown)) {
              const itemDiv = document.createElement('div');
              itemDiv.className = 'breakdown-item';
              itemDiv.innerHTML = `
                <span class="breakdown-label">${key.toUpperCase()}</span>
                <span class="breakdown-val">${desc}</span>
              `;
              breakdownBox.appendChild(itemDiv);
            }
          }

          // Toggle guest signup card based on login state
          const signupCard = document.getElementById('guest-signup-card');
          if (localStorage.getItem('styla_twin_logged_in') === 'true') {
            signupCard.style.display = 'none';
          } else {
            signupCard.style.display = 'block';
          }
        } else {
          alert("Sizing Error: " + (data.error || 'Failed to decode size.'));
          showSetup();
        }
      } catch (err) {
        loader.style.display = 'none';
        alert("Network Error: Could not connect to Styla server.");
        showSetup();
        console.error(err);
      }
    }

    function showSetup() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('result-view').style.display = 'none';
      document.getElementById('guest-login-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'flex';
    }

    async function runSizingDecode() {
      const loader = document.getElementById('loader');
      const resultView = document.getElementById('result-view');
      const setupView = document.getElementById('setup-view');
      const guestLoginView = document.getElementById('guest-login-view');
      const loaderText = document.getElementById('loader-text');

      loaderText.textContent = "Scanning page details...";
      loader.style.display = 'flex';
      resultView.style.display = 'none';
      setupView.style.display = 'none';
      guestLoginView.style.display = 'none';

      // Fetch scan history and overrides
      let api_scans = [];
      try {
        const rawScans = localStorage.getItem('styla_twin_api_scans');
        if (rawScans) api_scans = JSON.parse(rawScans);
      } catch (e) {}

      let measurement_overrides = {};
      try {
        const rawOverrides = localStorage.getItem('styla_twin_measurement_overrides');
        if (rawOverrides) measurement_overrides = JSON.parse(rawOverrides);
      } catch (e) {}

      // Toggle scan active badge
      const badge = document.getElementById('active-scan-badge');
      if (badge) {
        const activeScan = api_scans && Array.isArray(api_scans) ? api_scans.find(s => s.is_active) : null;
        if (activeScan) {
          badge.style.display = 'block';
        } else {
          badge.style.display = 'none';
        }
      }

      // 1. Fetch user measurements from localStorage
      const chest = localStorage.getItem('styla_twin_chest');
      const waist = localStorage.getItem('styla_twin_waist');
      const belly = localStorage.getItem('styla_twin_belly');
      const hips = localStorage.getItem('styla_twin_hips');
      const height = localStorage.getItem('styla_twin_height');
      const inseam = localStorage.getItem('styla_twin_inseam');

      if (!chest || !waist || !hips) {
        showSetup();
        return;
      }

      // 2. Fetch sizing from API
      try {
        const res = await fetch('/api/extension-decode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chest, waist, belly, hips, height, inseam,
            api_scans,
            measurement_overrides,
            pageTitle: activeScrapedContext ? activeScrapedContext.pageTitle : "Unknown Product",
            pageText: activeScrapedContext ? activeScrapedContext.pageText : "",
            tableHtml: activeScrapedContext ? activeScrapedContext.tableHtml : "",
            imagesBase64: [],
            url: activeScrapedContext ? activeScrapedContext.url : window.location.href
          })
        });

        const data = await res.json();
        loader.style.display = 'none';

        if (res.ok) {
          resultView.style.display = 'flex';
          
          if (!data.recommended_size) {
            document.getElementById('size-verdict').textContent = "Unknown";
            document.getElementById('explanation-text').textContent = "No size chart was detected on this product page.";
            return;
          }

          document.getElementById('size-verdict').textContent = data.recommended_size;
          document.getElementById('score-val').textContent = `${data.fit_match_score}%`;
          document.getElementById('score-bar').style.width = `${data.fit_match_score}%`;
          document.getElementById('explanation-text').textContent = data.explanation || '';

          // Render breakdown
          const breakdownBox = document.getElementById('breakdown-box');
          breakdownBox.innerHTML = '';
          if (data.fit_breakdown) {
            for (const [key, desc] of Object.entries(data.fit_breakdown)) {
              const itemDiv = document.createElement('div');
              itemDiv.className = 'breakdown-item';
              itemDiv.innerHTML = `
                <span class="breakdown-label">${key.toUpperCase()}</span>
                <span class="breakdown-val">${desc}</span>
              `;
              breakdownBox.appendChild(itemDiv);
            }
          }

          // Toggle guest signup card based on login state
          const signupCard = document.getElementById('guest-signup-card');
          if (localStorage.getItem('styla_twin_logged_in') === 'true') {
            signupCard.style.display = 'none';
          } else {
            signupCard.style.display = 'block';
          }
        } else {
          alert("Sizing Error: " + (data.error || 'Failed to decode size.'));
          showSetup();
        }
      } catch (err) {
        loader.style.display = 'none';
        alert("Network Error: Could not connect to Styla server.");
        showSetup();
        console.error(err);
      }
    }

    // AI Chat widget
    const chatInput = document.getElementById('chat-input');
    const chatSendBtn = document.getElementById('chat-send-btn');
    const chatMessages = document.getElementById('chat-messages');

    chatSendBtn.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChatMessage();
    });

    async function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      appendBubble(text, 'user');
      const loadingBubble = appendBubble('Tailor AI is thinking...', 'assistant', true);

      const chest = localStorage.getItem('styla_twin_chest');
      const waist = localStorage.getItem('styla_twin_waist');
      const belly = localStorage.getItem('styla_twin_belly');
      const hips = localStorage.getItem('styla_twin_hips');
      const height = localStorage.getItem('styla_twin_height');
      const inseam = localStorage.getItem('styla_twin_inseam');

      chatHistory.push({ role: 'user', content: text });

      try {
        let api_scans = [];
        try {
          const rawScans = localStorage.getItem('styla_twin_api_scans');
          if (rawScans) api_scans = JSON.parse(rawScans);
        } catch (e) {}

        let measurement_overrides = {};
        try {
          const rawOverrides = localStorage.getItem('styla_twin_measurement_overrides');
          if (rawOverrides) measurement_overrides = JSON.parse(rawOverrides);
        } catch (e) {}

        const res = await fetch('/api/extension-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chest, waist, belly, hips, height, inseam,
            api_scans,
            measurement_overrides,
            pageTitle: activeScrapedContext ? activeScrapedContext.pageTitle : "Uploaded Size Chart",
            pageText: activeScrapedContext ? activeScrapedContext.pageText : "",
            tableHtml: activeScrapedContext ? activeScrapedContext.tableHtml : "",
            imagesBase64: [],
            history: chatHistory
          })
        });

        const data = await res.json();
        chatMessages.removeChild(loadingBubble);

        if (res.ok) {
          appendBubble(data.reply, 'assistant');
          chatHistory.push({ role: 'assistant', content: data.reply });
        } else {
          appendBubble("Error: " + (data.error || "Failed to get response."), 'assistant');
        }
      } catch (err) {
        chatMessages.removeChild(loadingBubble);
        appendBubble("Network error: Could not reach chat server.", 'assistant');
        console.error(err);
      }
    }

    function appendBubble(text, role, isPending = false) {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      if (isPending) {
        bubble.style.opacity = '0.7';
        bubble.style.fontStyle = 'italic';
      }
      bubble.textContent = text;
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return bubble;
    }

    // ----------------- Guest Scanner & Forms Wiring -----------------
    document.addEventListener('DOMContentLoaded', () => {

      const btnModeScan = document.getElementById('btn-guest-mode-scan');
      const btnModeManual = document.getElementById('btn-guest-mode-manual');
      const scanPanel = document.getElementById('guest-scan-panel');
      const manualPanel = document.getElementById('guest-manual-panel');

      btnModeScan.addEventListener('click', () => {
        btnModeScan.style.background = 'var(--accent-pink)';
        btnModeScan.style.color = '#fff';
        btnModeManual.style.background = 'rgba(255,255,255,0.05)';
        btnModeManual.style.color = 'var(--text-muted)';
        scanPanel.style.display = 'block';
        manualPanel.style.display = 'none';
      });

      btnModeManual.addEventListener('click', () => {
        btnModeManual.style.background = 'var(--accent-pink)';
        btnModeManual.style.color = '#fff';
        btnModeScan.style.background = 'rgba(255,255,255,0.05)';
        btnModeScan.style.color = 'var(--text-muted)';
        manualPanel.style.display = 'block';
        scanPanel.style.display = 'none';
      });

      // Photo loaders for guest scan
      const guestFrontFile = document.getElementById('guest-front-file');
      const guestSideFile = document.getElementById('guest-side-file');
      const textGuestFront = document.getElementById('text-guest-front');
      const textGuestSide = document.getElementById('text-guest-side');
      const lblGuestFront = document.getElementById('lbl-guest-front');
      const lblGuestSide = document.getElementById('lbl-guest-side');

      guestFrontFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
          textGuestFront.textContent = "Loading...";
          lblGuestFront.style.borderColor = 'var(--accent-pink)';
          try {
            guestFrontBase64 = await compressFileImage(file);
            textGuestFront.textContent = "Front Loaded!";
            lblGuestFront.style.borderColor = '#10b981';
          } catch (err) {
            textGuestFront.textContent = "Error!";
            lblGuestFront.style.borderColor = '#ef4444';
          }
        }
      });

      guestSideFile.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
          textGuestSide.textContent = "Loading...";
          lblGuestSide.style.borderColor = 'var(--accent-pink)';
          try {
            guestSideBase64 = await compressFileImage(file);
            textGuestSide.textContent = "Side Loaded!";
            lblGuestSide.style.borderColor = '#10b981';
          } catch (err) {
            textGuestSide.textContent = "Error!";
            lblGuestSide.style.borderColor = '#ef4444';
          }
        }
      });

      // Guest Login/Signup toggle
      const btnShowLogin = document.getElementById('btn-show-guest-login');
      const btnBackToSetup = document.getElementById('btn-back-to-setup');
      const setupView = document.getElementById('setup-view');
      const loginView = document.getElementById('guest-login-view');

      btnShowLogin.addEventListener('click', () => {
        setupView.style.display = 'none';
        loginView.style.display = 'block';
      });

      btnBackToSetup.addEventListener('click', () => {
        loginView.style.display = 'none';
        setupView.style.display = 'flex';
      });

      // Guest Scan Submission
      const btnRunScan = document.getElementById('btn-guest-run-scan');
      btnRunScan.addEventListener('click', async () => {
        const gender = document.getElementById('guest-scan-gender').value;
        const weight = Number(document.getElementById('guest-scan-weight').value) || 140;
        const ft = Number(document.getElementById('guest-scan-height-ft').value) || 5;
        const inch = Number(document.getElementById('guest-scan-height-in').value) || 4;
        const heightInches = (ft * 12) + inch;
        const heightCm = Math.round(heightInches * 2.54);

        if (!guestFrontBase64 || !guestSideBase64) {
          alert("Please upload both front and side photos.");
          return;
        }

        btnRunScan.disabled = true;
        btnRunScan.textContent = "Uploading Photos...";

        try {
          const initRes = await fetch('/api/3dlook/init-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              gender,
              height: heightCm,
              weight: Math.round(weight * 0.453592),
              front_image: guestFrontBase64,
              side_image: guestSideBase64
            })
          });

          if (!initRes.ok) {
            const errData = await initRes.json();
            throw new Error(errData.error || "Failed to initialize scan.");
          }

          const session = await initRes.json();
          btnRunScan.textContent = "Processing Body (10s)...";

          let pollUrl = session.task_set_url;
          if (pollUrl && !pollUrl.startsWith('http')) {
            pollUrl = window.location.origin + pollUrl;
          }

          const pollStatus = async () => {
            try {
              const statusRes = await fetch(pollUrl);
              const statusData = await statusRes.json();
              
              if (statusData.is_ready && statusData.is_successful) {
                btnRunScan.textContent = "Finalizing Measurements...";
                
                let saveUrl = statusData.redirect_to;
                if (saveUrl && !saveUrl.startsWith('http')) {
                  saveUrl = window.location.origin + saveUrl;
                }
                
                const saveRes = await fetch(`${saveUrl}&username=guest`);
                const saveData = await saveRes.json();
                
                if (saveData.success) {
                  localStorage.setItem('styla_twin_chest', saveData.twin.chest);
                  localStorage.setItem('styla_twin_waist', saveData.twin.waist);
                  localStorage.setItem('styla_twin_belly', saveData.twin.belly || saveData.twin.waist);
                  localStorage.setItem('styla_twin_hips', saveData.twin.hips);
                  localStorage.setItem('styla_twin_height', heightInches.toString());
                  localStorage.setItem('styla_twin_inseam', saveData.twin.inseam);
                  localStorage.setItem('styla_twin_api_scans', JSON.stringify(saveData.api_scans));
                  localStorage.setItem('styla_twin_measurement_overrides', '{}');

                  alert("3D Body Scan complete! Measurements loaded.");
                  btnRunScan.disabled = false;
                  btnRunScan.textContent = "Run 3D Body Scan";
                  await runSizingDecode();
                } else {
                  throw new Error("Failed to save measurements.");
                }
              } else {
                setTimeout(pollStatus, 2000);
              }
            } catch (pollErr) {
              btnRunScan.disabled = false;
              btnRunScan.textContent = "Run 3D Body Scan";
              alert("Scanner Error: " + pollErr.message);
            }
          };

          setTimeout(pollStatus, 2000);

        } catch (err) {
          alert("Scanner Error: " + err.message);
          btnRunScan.disabled = false;
          btnRunScan.textContent = "Run 3D Body Scan";
        }
      });

      // Guest Manual Submission
      const btnManualSubmit = document.getElementById('btn-guest-manual-submit');
      btnManualSubmit.addEventListener('click', async () => {
        const chest = document.getElementById('guest-manual-chest').value;
        const waist = document.getElementById('guest-manual-waist').value;
        const belly = document.getElementById('guest-manual-belly').value;
        const hips = document.getElementById('guest-manual-hips').value;
        const ft = Number(document.getElementById('guest-manual-height-ft').value) || 5;
        const inch = Number(document.getElementById('guest-manual-height-in').value) || 4;
        const heightVal = (ft * 12) + inch;
        const inseam = document.getElementById('guest-manual-inseam').value;

        if (!chest || !waist || !hips) {
          alert("Please fill in at least Chest, Waist, and Hips.");
          return;
        }

        localStorage.setItem('styla_twin_chest', chest);
        localStorage.setItem('styla_twin_waist', waist);
        localStorage.setItem('styla_twin_belly', belly || waist);
        localStorage.setItem('styla_twin_hips', hips);
        localStorage.setItem('styla_twin_height', heightVal.toString());
        localStorage.setItem('styla_twin_inseam', inseam || '');
        localStorage.removeItem('styla_twin_api_scans');
        localStorage.removeItem('styla_twin_measurement_overrides');

        await runSizingDecode();
      });

      // Guest Login Submit
      const btnGuestLoginSubmit = document.getElementById('btn-guest-login-submit');
      const loginError = document.getElementById('guest-login-error');
      btnGuestLoginSubmit.addEventListener('click', async () => {
        const email = document.getElementById('guest-login-email').value.trim();
        const password = document.getElementById('guest-login-password').value;

        if (!email || !password) {
          loginError.textContent = "Please fill in email and password.";
          loginError.style.display = 'block';
          return;
        }

        btnGuestLoginSubmit.disabled = true;
        loginError.style.display = 'none';

        try {
          if (!supabase) throw new Error("Supabase is not loaded.");
          const { data: authData, error: authErr } = await supabase.auth.signInWithPassword({ email, password });
          if (authErr) throw authErr;

          const { data: profile, error: dbErr } = await supabase.from('profiles').select('*').eq('id', authData.user.id).single();
          if (dbErr) throw dbErr;

          localStorage.setItem('styla_twin_chest', profile.chest || '');
          localStorage.setItem('styla_twin_waist', profile.waist || '');
          localStorage.setItem('styla_twin_belly', profile.belly || profile.waist || '');
          localStorage.setItem('styla_twin_hips', profile.hips || '');
          localStorage.setItem('styla_twin_height', profile.height || '');
          localStorage.setItem('styla_twin_inseam', profile.inseam || '');
          localStorage.setItem('styla_twin_api_scans', JSON.stringify(profile.api_scans || []));
          localStorage.setItem('styla_twin_measurement_overrides', JSON.stringify(profile.measurement_overrides || {}));
          localStorage.setItem('styla_twin_logged_in', 'true');
          localStorage.setItem('styla_twin_user_email', email);

          alert("Logged in successfully! AI Tailor Profile synced.");
          await runSizingDecode();
        } catch (err) {
          loginError.textContent = err.message;
          loginError.style.display = 'block';
        } finally {
          btnGuestLoginSubmit.disabled = false;
        }
      });

      // Guest Signup / Account Save submit
      const btnGuestSignupSubmit = document.getElementById('btn-guest-signup-submit');
      const signupError = document.getElementById('guest-signup-error');
      if (btnGuestSignupSubmit) {
        btnGuestSignupSubmit.addEventListener('click', async () => {
          const email = document.getElementById('guest-signup-email').value.trim();
          const password = document.getElementById('guest-signup-password').value;

          if (!email || !password || password.length < 6) {
            signupError.textContent = "Please provide email and password (min 6 chars).";
            signupError.style.display = 'block';
            return;
          }

          btnGuestSignupSubmit.disabled = true;
          signupError.style.display = 'none';

          try {
            if (!supabase) throw new Error("Supabase is not loaded.");

            const chest = parseFloat(localStorage.getItem('styla_twin_chest'));
            const waist = parseFloat(localStorage.getItem('styla_twin_waist'));
            const belly = parseFloat(localStorage.getItem('styla_twin_belly'));
            const hips = parseFloat(localStorage.getItem('styla_twin_hips'));
            const height = parseFloat(localStorage.getItem('styla_twin_height'));
            const inseam = parseFloat(localStorage.getItem('styla_twin_inseam'));
            const api_scans = JSON.parse(localStorage.getItem('styla_twin_api_scans') || '[]');
            const measurement_overrides = JSON.parse(localStorage.getItem('styla_twin_measurement_overrides') || '{}');

            const { data: authData, error: signupErr } = await supabase.auth.signUp({
              email,
              password,
              options: {
                data: {
                  chest, waist, belly, hips, height, inseam,
                  api_scans,
                  measurement_overrides
                }
              }
            });

            if (signupErr) throw signupErr;

            // Auto-login to sync session
            const { error: loginErr } = await supabase.auth.signInWithPassword({ email, password });
            
            localStorage.setItem('styla_twin_logged_in', 'true');
            localStorage.setItem('styla_twin_user_email', email);

            document.getElementById('guest-signup-card').style.display = 'none';
            alert("Account created successfully! Sizing saved to Styla Cloud.");
          } catch (err) {
            signupError.textContent = err.message;
            signupError.style.display = 'block';
          } finally {
            btnGuestSignupSubmit.disabled = false;
          }
        });
      }

      // Size chart uploader wiring
      const btnTriggerUpload = document.getElementById('btn-trigger-upload');
      const extFileUpload = document.getElementById('ext-file-upload');
      if (btnTriggerUpload && extFileUpload) {
        btnTriggerUpload.addEventListener('click', () => {
          extFileUpload.click();
        });
        extFileUpload.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const compressedBase64 = await compressFileImage(file);
            await runAnalysisWithUploadedImage(compressedBase64);
          } catch (err) {
            console.error("Failed to process manual upload:", err);
            alert("Failed to process manual upload: " + err.message);
          } finally {
            extFileUpload.value = '';
          }
        });
      }
    });
  </script>
</body>
</html>
