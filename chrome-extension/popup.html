<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>STYLA Measure</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --accent: #ff2a75;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    .container {
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sync-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
    }

    .sync-badge.unsynced {
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: var(--text-muted);
    }

    .pulse {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-animation 2s infinite;
    }

    .pulse.unsynced {
      background: var(--text-muted);
      animation: none;
    }

    @keyframes pulse-animation {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .measurements-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .measurements-row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .input-wrapper input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    button {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(255, 42, 117, 0.2);
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: rgba(148, 163, 184, 0.3);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .loader {
      display: none;
      text-align: center;
      padding: 24px 16px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--accent);
      margin: 0 auto 12px auto;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    #result-panel {
      display: none;
      margin-top: 16px;
      animation: slideDown 0.3s ease-out forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card {
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 12px;
      padding: 14px;
    }

    .recommended-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
      color: white;
      font-weight: 800;
      font-size: 1.35rem;
      padding: 6px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
    }

    .fit-description {
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .fit-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 6px 0;
      font-size: 12px;
    }

    .fit-item:last-child {
      border-bottom: none;
    }

    .fit-label {
      font-weight: 600;
      color: var(--text-muted);
    }

    .fit-value {
      font-weight: 600;
      color: #cbd5e1;
    }

    .warning-box {
      margin-top: 12px;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fde68a;
      padding: 10px;
      border-radius: 8px;
      font-size: 11.5px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <span class="logo-text">STYLA Measure</span>
      </div>
      <div id="sync-status" class="sync-badge unsynced">
        <div id="sync-dot" class="pulse unsynced"></div>
        <span id="sync-text">Unsynced</span>
      </div>
    </header>

    <div class="section-title">Your Digital Twin</div>
    
    <div class="profile-card">
      <div class="measurements-grid">
        <div class="input-wrapper">
          <label for="chest">Chest (in)</label>
          <input type="number" id="chest" placeholder="--">
        </div>
        <div class="input-wrapper">
          <label for="waist">Waist (in)</label>
          <input type="number" id="waist" placeholder="--">
        </div>
        <div class="input-wrapper">
          <label for="hips">Hips (in)</label>
          <input type="number" id="hips" placeholder="--">
        </div>
      </div>
      <div class="measurements-row-2">
        <div class="input-wrapper">
          <label for="height">Height (in)</label>
          <input type="number" id="height" placeholder="e.g. 68">
        </div>
        <div class="input-wrapper">
          <label for="inseam">Inseam (in)</label>
          <input type="number" id="inseam" placeholder="e.g. 30">
        </div>
      </div>
    </div>

    <button id="analyze-btn">Analyze Fit on this Page</button>

    <div id="loader-panel" class="loader">
      <div class="spinner"></div>
      <div id="loader-status" class="loader-text">Analyzing page content...</div>
    </div>

    <div id="result-panel">
      <div class="section-title">Analysis Verdict</div>
      <div class="result-card">
        <div class="recommended-badge" id="rec-size">M</div>
        <div class="fit-description" id="explanation">Analyzing...</div>
        
        <div id="breakdown-list">
          <!-- Populated dynamically -->
        </div>

        <div id="warning-container" class="warning-box" style="display: none;">
          <strong>Fit Alert:</strong> <span id="warning-text"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
