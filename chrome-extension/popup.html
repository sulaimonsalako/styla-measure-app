<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>STYLA Measure</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    h2 {
      margin-top: 0;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #94a3b8;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: white;
    }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      opacity: 0.9;
    }
    #result {
      margin-top: 16px;
      padding: 12px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>STYLA Measure</h2>
  <p style="font-size: 12px; color: #94a3b8; margin-bottom: 16px;">
    Enter your Digital Twin measurements to check your fit on this page.
  </p>

  <div class="input-group">
    <label>Chest (in)</label>
    <input type="number" id="chest" placeholder="e.g. 38">
  </div>
  <div class="input-group">
    <label>Waist (in)</label>
    <input type="number" id="waist" placeholder="e.g. 32">
  </div>
  
  <button id="analyze-btn">Analyze Fit on this Page</button>
  
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
